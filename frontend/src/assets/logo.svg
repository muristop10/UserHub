<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 50" width="100%" height="100%">
  <defs>
    <linearGradient id="header-logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    
    <linearGradient id="accent-node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C7D2FE"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>

    <filter id="icon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#6366F1" flood-opacity="0.5"/>
    </filter>
  </defs>

  <g transform="translate(2, 2)" filter="url(#icon-glow)">
    <rect x="2" y="2" width="42" height="42" rx="13" fill="none" stroke="url(#header-logo-grad)" stroke-width="3.5"/>
    
    <path d="M 15 14 V 25 C 15 31 19 34 23 34 C 27 34 31 31 31 25 V 14" 
          fill="none" 
          stroke="url(#header-logo-grad)" 
          stroke-width="4" 
          stroke-linecap="round"/>

    <circle cx="31" cy="14" r="3.5" fill="url(#accent-node)"/>
    <circle cx="15" cy="14" r="2.5" fill="#FFFFFF"/>
  </g>

  <g transform="translate(56, 32)">
    <text x="0" y="0" 
          font-family="'Poppins', 'Inter', sans-serif" 
          font-weight="700" 
          font-size="24" 
          fill="#F8FAFC" 
          letter-spacing="-0.5">User</text>
    
    <text x="60" y="0" 
          font-family="'Poppins', 'Inter', sans-serif" 
          font-weight="700" 
          font-size="24" 
          fill="url(#header-logo-grad)" 
          letter-spacing="-0.5">Hub</text>
  </g>
</svg>
